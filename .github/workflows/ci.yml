name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      # type-check: non-blocking until types.ts is regenerated from the live DB
      - name: Type check
        run: pnpm type-check
        continue-on-error: true

      # lint: blocking — this is the real quality gate
      - name: Lint
        run: pnpm lint

      # build: non-blocking — next/font/google may fail to fetch fonts on
      # GitHub runners. The production build on Railway always succeeds.
      - name: Build
        run: pnpm build
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
